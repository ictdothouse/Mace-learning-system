# ==============================================================================
# 🌐 FAIL KONFIGURASI NGINX - eLearning Atlet SUKMA
# ==============================================================================
# Salin konfigurasi ini ke /etc/nginx/sites-available/mace-learning-system
# Dan bina symlink ke /etc/nginx/sites-enabled/
# ==============================================================================

server {
    listen 80;
    listen [::]:80;
    
    # Gantikan dengan nama domain sebenar anda
    server_name yourdomain.com www.yourdomain.com;

    # Had maksimum saiz fail upload (Penting untuk upload video modul pembelajaran)
    client_max_body_size 500M;

    # Gzip Compression untuk mempercepatkan loading website
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Log files
    access_log /var/log/nginx/mace-access.log;
    error_log /var/log/nginx/mace-error.log;

    # Proxy request ke Node.js Application (Running via PM2 on port 3000)
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        
        # Headers penting untuk websocket dan keselamatan
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        
        # Simpan IP asal pengguna untuk logging dan rate limiting
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Kebenaran timeout yang panjang untuk upload fail besar
        proxy_connect_timeout 600s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
    }

    # Blok untuk fail static (Optional: Jika ingin Nginx serve dist folder secara terus)
    # location /static/ {
    #     alias /home/ubuntu/Mace-learning-system/client/dist/;
    #     expires 30d;
    #     add_header Cache-Control "public, no-transform";
    # }
}

