name: Auto Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Deploy to VPS
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USERNAME }}
        key: ${{ secrets.VPS_SSH_KEY }}
        port: ${{ secrets.VPS_PORT }}
        script: |
          # Try to find the directory, usually in root or ubuntu user's home
          cd ~/Mace-learning-system || cd /root/Mace-learning-system || cd /home/ubuntu/Mace-learning-system || { echo "Directory not found"; exit 1; }
          
          echo "📥 Pulling latest code from GitHub..."
          git pull origin main
          
          echo "📦 Installing Backend Dependencies..."
          npm install
          
          echo "⚛️ Building React Frontend..."
          cd client
          npm install
          npm run build
          cd ..
          
          echo "🚀 Restarting PM2 Server..."
          pm2 restart mace
          pm2 save
          
          echo "✅ Deployment Successful!"
