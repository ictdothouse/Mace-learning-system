name: Auto Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Check if VPS secrets exist
      id: check_secrets
      env:
        VPS_HOST: ${{ secrets.VPS_HOST }}
      run: |
        if [ -z "$VPS_HOST" ]; then
          echo "VPS_HOST rahsia tidak dijumpai. Mengabaikan deployment VPS kerana sistem mungkin masih menggunakan Hostinger."
          echo "is_ready=false" >> $GITHUB_ENV
        else
          echo "is_ready=true" >> $GITHUB_ENV
        fi

    - name: Deploy to VPS
      if: env.is_ready == 'true'
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USERNAME }}
        key: ${{ secrets.VPS_SSH_KEY }}
        port: ${{ secrets.VPS_PORT }}
        script: |
          # Pergi ke direktori projek
          cd ~/Mace-learning-system || cd /root/Mace-learning-system || cd /home/ubuntu/Mace-learning-system || { echo "Directory not found"; exit 1; }
          
          echo "📥 Memuat turun kod terkini dari GitHub..."
          git pull origin main
          
          echo "📦 Memasang dependencies Backend..."
          npm install
          
          echo "⚛️ Membina React Frontend (Build)..."
          cd client
          npm install
          npm run build
          cd ..
          
          echo "🚀 Restart server NodeJS (PM2)..."
          pm2 restart mace
          pm2 save
          
          echo "✅ Deployment Auto-VPS Berjaya!"
